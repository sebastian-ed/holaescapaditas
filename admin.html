<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Hola Escapaditas</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml"/>
</head>
<body class="admin-login-body">
<div class="login-wrap">
  <div class="login-left">
    <div class="login-brand"><div class="logo-mark large">✈️</div><span class="brand-name">hola <strong>escapaditas</strong></span></div>
    <div class="login-deco">
      <div class="deco-card">🔒<span>Login con Supabase Auth</span></div>
      <div class="deco-card">📦<span>Paquetes persistentes</span></div>
      <div class="deco-card">⚙️<span>Configuración centralizada</span></div>
    </div>
  </div>
  <div class="login-right">
    <div class="login-box">
      <div class="login-header"><h1>Panel de gestión</h1><p>Ingresá con tu usuario administrador de Supabase.</p></div>
      <div id="loginAlert" class="login-alert hidden"></div>
      <div class="login-form">
        <div class="input-group">
          <label for="loginEmail">Email</label>
          <div class="input-wrap"><span class="input-ico">@</span><input type="email" id="loginEmail" placeholder="admin@tuagencia.com" autocomplete="email"></div>
        </div>
        <div class="input-group">
          <label for="loginPwd">Contraseña</label>
          <div class="input-wrap"><span class="input-ico">🔒</span><input type="password" id="loginPwd" placeholder="••••••••" autocomplete="current-password"><button type="button" class="toggle-pwd" id="togglePwd" aria-label="Ver contraseña">👁</button></div>
        </div>
        <button class="btn-login" id="btnLogin"><span id="btnLoginText">Ingresar al panel</span><span id="btnLoginLoader" class="hidden"><svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg></span></button>
      </div>
      <div class="login-attempts">No hay passwords hardcodeadas. Eso era deuda técnica con moño.</div>
      <a href="index.html" class="back-link">← Volver al sitio</a>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | Hola Escapaditas</title>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:ital,wght@0,700;1,700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="img/favicon.svg" type="image/svg+xml"/>
</head>
<body class="admin-login-body">

<div class="login-wrap">
  <div class="login-left">
    <div class="login-brand">
      <div class="logo-mark large">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z" fill="currentColor"/></svg>
      </div>
      <span class="brand-name">hola <strong>escapaditas</strong></span>
    </div>
    <div class="login-deco">
      <div class="deco-card">✈️<span>Paquetes activos</span></div>
      <div class="deco-card">📸<span>Galería de fotos</span></div>
      <div class="deco-card">⚙️<span>Configuración</span></div>
    </div>
  </div>

  <div class="login-right">
    <div class="login-box" id="loginBox">
      <div class="login-header">
        <h1>Panel de gestión</h1>
        <p>Ingresá tu contraseña para continuar</p>
      </div>

      <div id="loginAlert" class="login-alert hidden"></div>

      <div class="login-form" id="loginForm">
        <div class="input-group">
          <label for="loginPwd">Contraseña</label>
          <div class="input-wrap">
            <svg class="input-ico" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginPwd" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="toggle-pwd" id="togglePwd" aria-label="Ver contraseña">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <button class="btn-login" id="btnLogin">
          <span id="btnLoginText">Ingresar al panel</span>
          <span id="btnLoginLoader" class="hidden">
            <svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </span>
        </button>
      </div>

      <div class="login-attempts" id="loginAttempts"></div>

      <a href="index.html" class="back-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
        Volver al sitio
      </a>
    </div>
  </div>
</div>

<script src="js/paquetes.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
